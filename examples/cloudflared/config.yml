# Example cloudflared NAMED-tunnel config — expose the relay-kernel (loopback)
# via your hostname. Copy to ~/.cloudflared/config.yml, fill in your tunnel id,
# and run `cloudflared tunnel run fantastic-relay`. See ../../docs/RUNNING.md.
#
# The tunnel dials OUT to Cloudflare (no inbound ports). WebSockets pass through
# automatically. A kernel connects to wss://<hostname>/<GUID>, so the whole
# hostname routes to the relay-kernel WS — the GUID is a path component.

tunnel: fantastic-relay
credentials-file: /home/you/.cloudflared/REPLACE-WITH-TUNNEL-ID.json

ingress:
  - hostname: relay.example.com
    service: ws://127.0.0.1:9443
  - service: http_status:404
