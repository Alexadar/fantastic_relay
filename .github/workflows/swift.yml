name: Swift

# Build + test the Swift relay package (RelayCore + relayd). No deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  swift:
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: swift
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: format (lint)
        run: swift format lint --strict --recursive Sources Tests
      - name: build
        run: swift build
      - name: test
        run: swift test
