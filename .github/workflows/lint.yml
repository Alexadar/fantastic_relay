name: lint

# Lightweight lint pass on Ubuntu — yaml + shell. No build, no secrets.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: yaml + shell
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq yamllint shellcheck
      - name: yamllint
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable, document-start: disable, truthy: disable}}" \
            .github/workflows/*.yml
      - name: shellcheck
        run: |
          shopt -s nullglob globstar
          files=( **/*.sh )
          if [ ${#files[@]} -gt 0 ]; then
            shellcheck -S warning "${files[@]}"
          else
            echo "no shell scripts to check"
          fi
